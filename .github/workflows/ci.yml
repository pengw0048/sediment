name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras
        env:
          UV_PYTHON: "3.12"

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy pke/

      - name: Pytest
        run: uv run pytest -v

      - name: Test count summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Tests"
            echo
            collected=$(uv run pytest --collect-only -q 2>/dev/null | tail -n 1 || echo "unknown")
            echo "- Collected: ${collected}"
          } >> "$GITHUB_STEP_SUMMARY"
