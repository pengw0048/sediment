name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy pke/
      - run: uv run pytest --cov=pke --cov-report=term-missing --cov-report=xml
      - name: Add coverage summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Coverage"
            echo
            if [ -f coverage.xml ]; then
              uv run python -c 'import xml.etree.ElementTree as ET; root = ET.parse("coverage.xml").getroot(); line_rate = float(root.attrib["line-rate"]) * 100; branch_rate = float(root.attrib.get("branch-rate", 0)) * 100; lines_valid = int(root.attrib["lines-valid"]); lines_covered = int(root.attrib["lines-covered"]); print(f"- Lines: {line_rate:.1f}% ({lines_covered}/{lines_valid})"); print(f"- Branches: {branch_rate:.1f}%")'
            else
              echo "coverage.xml was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
